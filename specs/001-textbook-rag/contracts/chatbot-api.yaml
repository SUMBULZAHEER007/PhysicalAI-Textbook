openapi: 3.0.0
info:
  title: RAG Chatbot API
  version: 1.0.0
description: API for interacting with the AI-native textbook RAG chatbot.

servers:
  - url: /api/v1
    description: API server for the RAG chatbot

paths:
  /query:
    post:
      summary: Submit a natural language query to the RAG chatbot
      operationId: submitQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotQueryRequest'
      responses:
        '200':
          description: Successful query response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatbotQueryResponse'
        '400':
          description: Invalid request payload
        '500':
          description: Internal server error

components:
  schemas:
    ChatbotQueryRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: The user's natural language question.
          example: "What is Physical AI?"
        context_text:
          type: string
          nullable: true
          description: Optional. Specific text selected by the user to provide context for the query.
          example: "Selected text about humanoid robotics."
    ChatbotQueryResponse:
      type: object
      required:
        - answer
        - sources
      properties:
        answer:
          type: string
          description: The AI-generated response text, synthesized from textbook content.
          example: "Physical AI refers to the integration of artificial intelligence with physical systems, such as robots, to enable them to perceive, reason, and act in the real world."
        sources:
          type: array
          description: List of textbook sections or pages that contributed to the answer.
          items:
            type: string
            example: "Chapter 1: Introduction to Physical AI"
