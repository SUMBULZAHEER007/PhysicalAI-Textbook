name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'physical-ai-book/package-lock.json'

      - name: Install dependencies
        run: cd physical-ai-book && npm ci

      - name: Build Docusaurus site
        run: cd physical-ai-book && npm run build
        env:
          NODE_ENV: production

      - name: List build output
        run: ls -la physical-ai-book/build/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./physical-ai-book/build
          cname: false
          force_orphan: true
