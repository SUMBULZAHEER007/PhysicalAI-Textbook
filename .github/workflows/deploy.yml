name: Deploy Physical AI Textbook
# 🌟 Temp change for troubleshooting v4 

# ...
on:
  push:
    branches:
      - main  # workflow sirf main branch pe trigger hoga
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # ✅ FIX: Yahan permissions block add karein
    permissions:
      contents: read
      pages: write
      id-token: write # Yeh zaroori hai 'Unable to get ID_TOKEN' error ke liye
      
    # 📝 NOTE: environment block bhi zaroori hai agar aapne Pages settings mein Environment use kiya hai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}


    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        working-directory: ./physical-ai-book
        run: npm install

      # 4️⃣ Build Docusaurus site
      - name: Build site
        working-directory: ./physical-ai-book
        run: npm run build

      # 5️⃣ Upload artifact for GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./physical-ai-book/build

      # 6️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment # id zaroori hai environment url output ke liye
        uses: actions/deploy-pages@v4