name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: cd physical-ai-book && npm ci --prefer-offline

      - name: Verify docs folder
        run: ls -la physical-ai-book/docs/

      - name: Build static site
        run: cd physical-ai-book && npm run build

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Copy build to gh-pages
        run: |
          rm -rf gh-pages-dir/*
          cp -r physical-ai-book/build/* gh-pages-dir/
          cp physical-ai-book/build/.nojekyll gh-pages-dir/ || true
          ls -la gh-pages-dir/docs/ || echo "No docs folder in build"

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-dir
          git add -A
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "Deploy from GitHub Actions"
            git push
          fi
