name: Deploy Physical AI Textbook

on:
  push:
    branches:
      - main  # workflow sirf main branch pe trigger hoga
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        working-directory: ./physical-ai-book
        run: npm install

      # 4️⃣ Build Docusaurus site
      - name: Build site
        working-directory: ./physical-ai-book
        run: npm run build

      # 5️⃣ Upload artifact for GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./physical-ai-book/build

      # 6️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
